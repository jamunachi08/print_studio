<!--
  Neotec Print Studio v2 — Easy Print Format Designer
  Built for non-technical users: nothing is typed by hand.
  - Drag friendly-named fields onto the page (no field-name knowledge needed)
  - Visual formula builder: click fields + operators, see the live answer
  - Smart Blocks: drop a whole Company Header / Items Table / Totals in one move
  - WYSIWYG: the canvas shows real data, so what you see is what prints
  Exports config_json consumed by the Frappe server renderer (integration kit).
-->
<meta charset="utf-8">
<style>
  :root{
    --bg:#eef0f3; --panel:#fff; --ink:#1f2733; --muted:#6b7480;
    --line:#e4e7ec; --line2:#cdd2da; --accent:#2f6f8f; --accent2:#caa14a;
    --accent-soft:#e7f0f4; --gold-soft:#f6efdd; --band:#fafbfc; --grid:#eef0f3;
    --detail:#fff8ec; --header:#eef4f7; --footer:#f3f1ee; --ok:#3f7d56;
    --mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:13px}
  button{font-family:inherit;font-size:12px;cursor:pointer}
  .app{display:grid;grid-template-columns:228px 1fr 270px;grid-template-rows:48px 1fr;height:100vh}
  .topbar{grid-column:1/4;display:flex;align-items:center;gap:8px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line)}
  .brand{font-weight:700;color:var(--ink);line-height:1.05}
  .brand b{color:var(--accent)} .brand small{display:block;font-weight:500;color:var(--muted);font-size:10px;letter-spacing:.4px}
  .tdoc select{font-size:12px;padding:6px 9px;border:1px solid var(--line2);border-radius:7px;background:#fff}
  .spacer{flex:1}
  .tbtn{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border:1px solid var(--line2);border-radius:8px;background:#fff;color:var(--ink)}
  .tbtn:hover{background:var(--accent-soft);border-color:var(--accent)}
  .tbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .toggle{display:flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
  .toggle button{border:0;background:#fff;padding:7px 10px;color:var(--muted)}
  .toggle button.on{background:var(--accent);color:#fff}
  .zoom{display:flex;align-items:center;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
  .zoom button{border:0;background:#fff;padding:7px 9px} .zoom button:hover{background:var(--accent-soft)}
  .zoom span{min-width:42px;text-align:center;color:var(--muted);font-size:11px}

  /* left */
  .left{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .tabs{display:flex;border-bottom:1px solid var(--line)}
  .tabs button{flex:1;border:0;background:#fff;padding:10px 0;color:var(--muted);font-weight:600;border-bottom:2px solid transparent}
  .tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
  .leftbody{overflow:auto;padding:10px;flex:1}
  .gh{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:12px 4px 6px;display:flex;align-items:center;gap:6px}
  .gh:first-child{margin-top:2px}

  .pitem{display:flex;align-items:center;gap:9px;width:100%;padding:8px 9px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--ink);text-align:left;margin-bottom:2px}
  .pitem:hover{background:var(--accent-soft);border-color:var(--line)}
  .pitem .ico{width:24px;height:24px;display:grid;place-items:center;border:1px solid var(--line2);border-radius:6px;background:#fff;color:var(--accent);flex:none}
  .pitem .ico svg{width:14px;height:14px}
  .pitem small{display:block;color:var(--muted);font-size:10px}

  /* draggable field chips */
  .fld{display:flex;align-items:center;gap:8px;width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);text-align:left;margin-bottom:5px;cursor:grab}
  .fld:hover{border-color:var(--accent);background:var(--accent-soft)}
  .fld:active{cursor:grabbing}
  .fld .ft{width:18px;height:18px;border-radius:5px;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff;flex:none}
  .fld .ft.txt{background:#6b7480}.fld .ft.num{background:var(--accent)}.fld .ft.date{background:#8a6fae}
  .fld .nm{flex:1;line-height:1.15}
  .fld .nm small{display:block;color:var(--muted);font-size:9px;font-family:var(--mono)}
  .fld .drag{color:var(--line2)}
  .srcsel{width:100%;margin-bottom:8px;padding:7px;border:1px solid var(--line2);border-radius:7px}
  .tip{margin:4px 4px 0;padding:9px;border:1px dashed var(--line2);border-radius:8px;color:var(--muted);font-size:11px;line-height:1.5}
  .tip b{color:var(--accent)}

  .block{width:100%;text-align:left;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:8px;cursor:pointer}
  .block:hover{border-color:var(--accent2);background:var(--gold-soft)}
  .block .bt{font-weight:700;display:flex;align-items:center;gap:7px}
  .block .bt .d{width:8px;height:8px;border-radius:50%;background:var(--accent2)}
  .block small{display:block;color:var(--muted);margin-top:3px;font-size:11px;line-height:1.4}

  /* stage */
  .stage{overflow:auto;background:repeating-linear-gradient(45deg,#e7e9ec,#e7e9ec 10px,#e3e5e9 10px,#e3e5e9 20px);padding:26px;position:relative}
  .page-wrap{margin:0 auto;transform-origin:top center}
  .page{background:#fff;box-shadow:0 8px 28px rgba(20,30,50,.18);position:relative}
  .ruler-note{position:sticky;top:0;color:#7d858f;font-size:11px;margin-bottom:8px;text-align:center}
  .band{position:relative;border-bottom:1px dashed var(--line2);background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:18.9px 18.9px}
  .band.report_header,.band.report_footer{background-color:#fff}
  .band.page_header{background-color:var(--header)} .band.page_footer{background-color:var(--footer)} .band.detail{background-color:var(--detail)}
  .band.group_header,.band.group_footer{background-color:#f0f4ef}
  .band.dropok{outline:2px dashed var(--accent);outline-offset:-3px;background-color:var(--accent-soft)}
  .band-tag{position:absolute;left:0;top:0;font-size:9px;font-weight:700;letter-spacing:.5px;color:#9aa3ad;background:rgba(255,255,255,.72);padding:2px 6px;border-bottom-right-radius:6px;text-transform:uppercase;z-index:5;pointer-events:none}
  .band-tag em{font-style:normal;color:var(--accent);font-weight:600}
  .band-grip{position:absolute;left:0;right:0;bottom:-4px;height:8px;cursor:ns-resize;z-index:6}
  .band.sel{outline:2px solid var(--accent);outline-offset:-2px}

  .el{position:absolute;overflow:hidden;display:flex;align-items:center;cursor:move;font-size:11px;line-height:1.15;user-select:none}
  .el .lbl{pointer-events:none;width:100%;padding:1px 3px;white-space:pre-wrap}
  .el.sel{outline:1.5px solid var(--accent);z-index:20}
  .el.t_field.showfields{background:rgba(47,111,143,.08)} .el.t_formula.showfields{background:rgba(202,161,74,.12)}
  .el .rs{position:absolute;width:10px;height:10px;right:-1px;bottom:-1px;background:#fff;border:1.5px solid var(--accent);border-radius:2px;cursor:nwse-resize;display:none}
  .el.sel .rs{display:block}
  .el .qrbox,.el .bcbox{width:100%;height:100%;display:grid;place-items:center}
  .el .qrbox svg,.el .bcbox svg{max-width:100%;max-height:100%}
  .ph{width:100%;height:100%;display:grid;place-items:center;font-size:9px;color:#8a929c;background:repeating-linear-gradient(45deg,#f4f5f7,#f4f5f7 4px,#eceef1 4px,#eceef1 8px);border:1px solid var(--line2);text-align:center}

  /* inspector */
  .inspector{background:var(--panel);border-left:1px solid var(--line);overflow:auto}
  .insp-h{padding:11px 13px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .insp-h .typetag{font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:20px}
  .sec{border-bottom:1px solid var(--line)}
  .sec>summary{list-style:none;cursor:pointer;padding:9px 13px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .sec>summary::-webkit-details-marker{display:none}
  .sec>summary::before{content:"▸";color:var(--line2)} .sec[open]>summary::before{content:"▾"}
  .sec .body{padding:4px 13px 13px}
  .row{display:flex;gap:7px;margin:6px 0;align-items:center}
  .row label{width:62px;flex:none;color:var(--muted);font-size:11px}
  input,select,textarea{font-family:inherit;font-size:12px;width:100%;padding:6px 7px;border:1px solid var(--line2);border-radius:7px;background:#fff;color:var(--ink)}
  textarea{resize:vertical;min-height:48px;font-family:var(--mono);font-size:11px}
  input[type=color]{padding:2px;height:30px} input[type=checkbox]{width:auto}
  .seg{display:flex;border:1px solid var(--line2);border-radius:7px;overflow:hidden}
  .seg button{flex:1;border:0;background:#fff;padding:6px 0;color:var(--muted)} .seg button.on{background:var(--accent);color:#fff}
  .mini{display:flex;gap:6px}.mini .row{flex:1;margin:0}
  .bindcard{border:1px solid var(--line);border-radius:9px;padding:9px;background:#fafbfc}
  .bindcard .cur{display:flex;align-items:center;gap:8px;font-weight:600}
  .bindcard .cur .ft{width:18px;height:18px;border-radius:5px;display:grid;place-items:center;font-size:10px;color:#fff;font-weight:700}
  .bindcard .path{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px}
  .editbind{width:100%;margin-top:8px;padding:7px;border:1px solid var(--accent);color:var(--accent);background:#fff;border-radius:7px}
  .editbind:hover{background:var(--accent-soft)}
  .empty{padding:30px 16px;color:var(--muted);text-align:center;font-size:12px;line-height:1.6}
  .delbtn{width:100%;margin-top:10px;padding:8px;border:1px solid #e7b4b4;background:#fdf0f0;color:#9a3434;border-radius:8px}
  .fieldnote{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4}
  .formbtn{width:100%;padding:8px;border:1px solid var(--accent2);background:var(--gold-soft);color:#7a5d18;border-radius:8px;font-weight:600}

  /* context menu */
  .ctx{position:fixed;z-index:200;background:#fff;border:1px solid var(--line2);border-radius:10px;box-shadow:0 12px 34px rgba(20,30,50,.2);padding:5px;min-width:178px;display:none}
  .ctx button{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;padding:8px 9px;border-radius:7px;color:var(--ink);text-align:left}
  .ctx button:hover{background:var(--accent-soft)} .ctx .sepm{height:1px;background:var(--line);margin:4px 6px}
  .ctx .k{width:15px;color:var(--accent);display:grid;place-items:center}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(15,22,32,.5);display:none;align-items:center;justify-content:center;z-index:300}
  .modal .box{background:#fff;border-radius:14px;width:min(760px,94vw);max-height:88vh;overflow:hidden;display:flex;flex-direction:column}
  .modal .mh{padding:14px 17px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .modal .mb{padding:15px 17px;overflow:auto}
  .modal .mf{padding:13px 17px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
  .x{border:0;background:transparent;font-size:20px;color:var(--muted);cursor:pointer;line-height:1}

  /* formula builder */
  .fb{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .fb .picklist{border:1px solid var(--line);border-radius:9px;max-height:240px;overflow:auto;padding:6px}
  .fb .picklist .gh{margin:8px 4px 4px}
  .fb .pk{display:block;width:100%;text-align:left;border:0;background:transparent;padding:6px 8px;border-radius:6px;color:var(--ink)}
  .fb .pk:hover{background:var(--accent-soft)} .fb .pk small{color:var(--muted);font-family:var(--mono);font-size:9px}
  .fb .ops{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
  .fb .ops button{border:1px solid var(--line2);background:#fff;border-radius:7px;padding:7px 12px;font-weight:700;min-width:38px}
  .fb .ops button:hover{background:var(--accent-soft);border-color:var(--accent)}
  .fb .expr{width:100%;min-height:72px;border:1px solid var(--line2);border-radius:8px;padding:9px;font-family:var(--mono);font-size:12px;background:#fcfcfd}
  .fb .result{margin-top:12px;padding:12px 14px;border-radius:10px;background:linear-gradient(180deg,#f1f8f3,#e7f3eb);border:1px solid #cfe7d8}
  .fb .result .rl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ok)}
  .fb .result .rv{font-size:24px;font-weight:800;color:#23553a;margin-top:2px}
  .fb .result.err{background:#fdf1f1;border-color:#eecccc}.fb .result.err .rv,.fb .result.err .rl{color:#9a3434}
  .fb .meta{display:flex;gap:10px;align-items:center;margin-top:12px}

  /* preview */
  .preview .band{background-image:none;border-bottom:0}
  .preview .band-tag,.preview .band-grip,.preview .rs{display:none}
  .preview .el{outline:0;cursor:default;background:transparent}
</style>

<div class="app">

    <div class="spacer"></div>

  <!-- LEFT -->
  <div class="left">

  <!-- CENTER -->
  <div class="stage" id="stage">

</div>

</div></div>

function renderPreview(){const data=SAMPLE[schema.doctype]||{};schema.bands.forEach(band=>{
 if(band.type==="detail"&&band.dataSource&&!band.elements.some(e=>e.type==="table")){(data[band.dataSource]||[]).forEach(row=>{const b=document.createElement('div');b.className="band "+band.type;b.style.height=mm(band.height)+"px";band.elements.forEach(el=>{if(el.type==="table")b.appendChild(buildEl(band,el,false));else{const n=buildEl(band,el,false);const l=n.querySelector('.lbl');if(l)l.textContent=resolveText(band,el,row);b.appendChild(n);}});page.appendChild(b);});}
 else{const b=document.createElement('div');b.className="band "+band.type;b.style.height=mm(band.height)+"px";band.elements.forEach(el=>b.appendChild(buildEl(band,el,true)));page.appendChild(b);}
});}

/* ===== move / resize ===== */
let drag=null;
function startMove(e,band,el){e.preventDefault();selectEl(band.id,el.id);const sx=e.clientX,sy=e.clientY,ox=el.x,oy=el.y;drag={move:ev=>{let nx=ox+(ev.clientX-sx)/(PXMM*zoom),ny=oy+(ev.clientY-sy)/(PXMM*zoom);if(snap){nx=Math.round(nx/2)*2;ny=Math.round(ny/2)*2;}el.x=Math.max(0,+nx.toFixed(1));el.y=Math.max(0,+ny.toFixed(1));render();buildInspector();}};}
function startResize(e,band,el){e.preventDefault();e.stopPropagation();selectEl(band.id,el.id);const sx=e.clientX,sy=e.clientY,ow=el.w,oh=el.h;drag={move:ev=>{let nw=ow+(ev.clientX-sx)/(PXMM*zoom),nh=oh+(ev.clientY-sy)/(PXMM*zoom);if(snap){nw=Math.round(nw/2)*2;nh=Math.round(nh/2)*2;}el.w=Math.max(2,+nw.toFixed(1));el.h=Math.max(1,+nh.toFixed(1));render();buildInspector();}};}
function startBandResize(e,band){e.preventDefault();e.stopPropagation();selectBand(band.id);const sy=e.clientY,oh=band.height;drag={move:ev=>{let nh=oh+(ev.clientY-sy)/(PXMM*zoom);if(snap)nh=Math.round(nh/2)*2;band.height=Math.max(6,+nh.toFixed(1));render();buildInspector();}};}
window.addEventListener('mousemove',e=>{if(drag)drag.move(e);});
window.addEventListener('mouseup',()=>{drag=null;});

/* ===== drag fields/blocks onto canvas ===== */
let dragPayload=null;
function onDrop(e,band,bEl){
 e.preventDefault();bEl.classList.remove('dropok');
 const r=bEl.getBoundingClientRect();
 let x=(e.clientX-r.left)/(PXMM*zoom), y=(e.clientY-r.top)/(PXMM*zoom);
 if(snap){x=Math.round(x/2)*2;y=Math.round(y/2)*2;}
 const pl=dragPayload; if(!pl)return;
 if(pl.kind==="field"){
  const inDetail=band.type==="detail"&&band.dataSource;
  const src=inDetail?band.dataSource:pl.source;
  const el=mkEl("field",+x.toFixed(1),+y.toFixed(1));
  el.props.source=src; el.props.field=pl.field;
  if(ftype(pl.field)===T.num){el.props.align="right";el.props.decimals="2";}
  band.elements.push(el);selectEl(band.id,el.id);
 } else if(pl.kind==="element"){
  const el=mkEl(pl.type,+x.toFixed(1),+y.toFixed(1));band.elements.push(el);selectEl(band.id,el.id);
 }
 dragPayload=null;
}

/* ===== selection + inspector ===== */
function selectBand(id){sel={bandId:id};render();buildInspector();}
function selectEl(b,e){sel={bandId:b,elId:e};render();buildInspector();if(leftTab==='layers')buildLayersTab();}
function findBand(id){return schema.bands.find(b=>b.id===id);}
function findEl(){if(!sel||!sel.elId)return null;const b=findBand(sel.bandId);return b?b.elements.find(e=>e.id===sel.elId):null;}
const inspector=document.getElementById('inspector');
function ftBadge(f){const t=ftype(f);return `<span class="ft ${t}">${t==='num'?'#':t==='date'?'D':'T'}</span>`;}
function buildInspector(){
 if(!sel){inspector.innerHTML=`<div class="empty">Click a box to edit it.<br><br>Or drag a <b>Field</b> from the left onto the page.</div>`;return;}
 const band=findBand(sel.bandId);
 inspector.innerHTML=sel.elId?inspectorForEl(band,findEl()):inspectorForBand(band);
 wireInspector();
}
function alignSeg(v){return `<div class="seg" data-seg="align">${["left","center","right"].map(a=>`<button data-v="${a}" class="${v===a?'on':''}">${a[0].toUpperCase()}</button>`).join("")}</div>`;}

 body+=`<details class="sec" open><summary>Position &amp; size (mm)</summary><div class="body">

  <div class="mini"><div class="row"><label>W</label><input data-w type="number" step="0.5" value="${el.w}"></div><div class="row"><label>H</label><input data-h type="number" step="0.5" value="${el.h}"></div></div>

 if(["text","field","formula"].includes(el.type)){

   <div class="row"><label>Wrap</label><label style="width:auto;color:var(--ink)"><input type="checkbox" id="wrapText" ${p.nowrap?'':'checked'}> Wrap long text onto multiple lines</label></div>
   </div></details>`;
 }
 if(el.type==="field"||el.type==="formula"){
  body+=`<details class="sec"><summary>Number / text format</summary><div class="body">
   <div class="row"><label>Decimals</label><input data-pp="decimals" placeholder="(none)" value="${p.decimals??''}"></div>
   ${el.type==="field"?`<div class="row"><label>Before</label><input data-pp="prefix" value="${esc(p.prefix||'')}"></div><div class="row"><label>After</label><input data-pp="suffix" value="${esc(p.suffix||'')}"></div>`:""}
   </div></details>`;
 }
 if(el.type==="barcode"){body+=`<details class="sec" open><summary>Barcode</summary><div class="body"><div class="row"><label>Type</label><select data-pp="format">${["CODE128","CODE39","EAN13","UPC"].map(f=>`<option ${p.format===f?'selected':''}>${f}</option>`).join("")}</select></div><div class="row"><label>Text</label><label style="width:auto;color:var(--ink)"><input type="checkbox" data-pp="showValue" ${p.showValue?'checked':''}> show number</label></div></div></details>`;}
 if(el.type==="qr"){body+=`<details class="sec" open><summary>QR</summary><div class="body"><div class="row"><label>Quality</label><select data-pp="ecc">${["L","M","Q","H"].map(f=>`<option ${p.ecc===f?'selected':''}>${f}</option>`).join("")}</select></div></div></details>`;}
 if(el.type==="image"){body+=`<details class="sec" open><summary>Image</summary><div class="body">

 ${p.src?`<div style="margin-top:6px;text-align:center"><img src="${esc(p.src)}" style="max-width:100%;max-height:90px;border:1px solid var(--line2);border-radius:6px"></div>`:''}

   <div class="mini"><div class="row"><label>Size</label><input data-pp="fontSize" type="number" step="0.5" value="${p.fontSize||9}"></div><div class="row"><label>Color</label><input data-pp="color" type="color" value="${p.color||'#1f2733'}"></div></div>

   body+=`<details class="sec" open><summary>HTML / Jinja</summary><div class="body"><textarea data-pp="html" spellcheck="false" style="min-height:120px">${esc(p.html||"")}</textarea><div class="fieldnote">Full Jinja is rendered on the server. Use <code>{{ doc.field }}</code>, <code>{% if %}</code>, loops, and any Frappe Jinja method. Great for tax tables, terms, conditional notes.</div></div></details>`;}
 if(el.type==="table"){body+=`<details class="sec" open><summary>Table height</summary><div class="body">
   <div class="row"><label>Mode</label><select data-pp="heightMode"><option value="variable" ${p.heightMode!=="fixed"?'selected':''}>Variable (footer follows items)</option><option value="fixed" ${p.heightMode==="fixed"?'selected':''}>Fixed box (empty rows fill)</option></select></div>
   <div class="row"><label>Row ht</label><input data-pp="rowH" type="number" step="0.5" value="${p.rowH||6}"> <span class="fieldnote" style="margin:0">mm</span></div>

   <div class="fieldnote"><b>Variable:</b> 1 item \u2192 short table, footer right after. <b>Fixed:</b> the box keeps its height (drag the bottom edge to size it) and fills with empty ruled rows.</div>

function inspectorForBand(band){
 const dt=schema.doctype,tableSrcs=Object.keys(DOCTYPES[dt].sources).filter(k=>DOCTYPES[dt].sources[k].table);
 let body=`<div class="insp-h"><span>Section</span><span class="typetag">${BAND_TYPES.find(b=>b.t===band.type)?.label||band.type}</span></div>`;
 body+=`<details class="sec" open><summary>Section settings</summary><div class="body">
  <div class="row"><label>Type</label><select data-band="type">${BAND_TYPES.map(b=>`<option value="${b.t}" ${band.type===b.t?'selected':''}>${b.label}</option>`).join("")}</select></div>
  <div class="row"><label>Height</label><input data-band="height" type="number" step="0.5" value="${band.height}"></div>`;
 if(band.type==="detail"||band.type==="group_header"||band.type==="group_footer"){
  body+=`<div class="row"><label>Repeat&nbsp;for</label><select data-band="dataSource"><option value="">—</option>${tableSrcs.map(k=>`<option value="${k}" ${band.dataSource===k?'selected':''}>${DOCTYPES[dt].sources[k].label}</option>`).join("")}</select></div>
   <div class="fieldnote">This section prints once for every row.</div>`;
 }
 body+=`</div></details><div class="body"><div class="fieldnote" style="margin-bottom:8px">${band.elements.length} box(es) here.</div><button class="delbtn" id="delBand">Delete section</button></div>`;
 return body;
}
function wireInspector(){
 const band=findBand(sel.bandId),el=findEl();
 ["x","y","w","h"].forEach(k=>{const i=inspector.querySelector(`[data-${k}]`);if(i)i.addEventListener('input',()=>{el[k]=parseFloat(i.value)||0;render();});});
 inspector.querySelectorAll('[data-pp]').forEach(inp=>{const ev=inp.type==="checkbox"||inp.tagName==="SELECT"?"change":"input";inp.addEventListener(ev,()=>{el.props[inp.dataset.pp]=inp.type==="checkbox"?inp.checked:inp.value;render();});});
 inspector.querySelectorAll('[data-seg]').forEach(seg=>seg.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{el.props[seg.dataset.seg]=b.dataset.v;render();buildInspector();})));
 inspector.querySelectorAll('[data-band]').forEach(inp=>{const ev=inp.tagName==="SELECT"?"change":"input";inp.addEventListener(ev,()=>{let v=inp.value;if(inp.dataset.band==="height")v=parseFloat(v)||10;band[inp.dataset.band]=v;if(inp.dataset.band==="type"){band.showOn=SHOW_ON[v]||"every_page";if(!["detail","group_header","group_footer"].includes(v))band.dataSource=undefined;}render();buildInspector();});});
 const rb=inspector.querySelector('#rebind');if(rb)rb.addEventListener('click',()=>openFieldPicker(band,el));
 const ui=inspector.querySelector('#upImg');if(ui)ui.addEventListener('click',async()=>{ if(!EMBEDDED){alert('Image upload works inside ERPNext.');return;} const url=await bridge('pickImage',{}); if(url){ el.props.src=url; render(); buildInspector(); } });
 const tf=inspector.querySelector('#toField');if(tf)tf.addEventListener('click',()=>{ const keep=el.props; el.type='field'; el.props={source:'doc',field:(DOCTYPES[schema.doctype].sources.doc.fields[1]||{name:'name'}).name,fontSize:keep.fontSize,bold:keep.bold,italic:keep.italic,align:keep.align,color:keep.color,bg:keep.bg||'',prefix:'',suffix:'',decimals:'',border:'none'}; render(); buildInspector(); openFieldPicker(band,el); });
 const tt=inspector.querySelector('#toTable');if(tt)tt.addEventListener('click',()=>convertToTable(band,el));
 const wt=inspector.querySelector('#wrapText');if(wt)wt.addEventListener('change',()=>{el.props.nowrap=!wt.checked;render();});
 const ef=inspector.querySelector('#editFormula');if(ef)ef.addEventListener('click',()=>openFormula(band,el));
 const de=inspector.querySelector('#delEl');if(de)de.addEventListener('click',()=>{band.elements=band.elements.filter(x=>x.id!==el.id);sel={bandId:band.id};render();buildInspector();});
 const db=inspector.querySelector('#delBand');if(db)db.addEventListener('click',()=>{if(schema.bands.length<=1)return;schema.bands=schema.bands.filter(x=>x.id!==band.id);sel=null;render();buildInspector();});
 const ce=inspector.querySelector('#colEditor');if(ce)buildColEditor(ce,band,el);
}
function makeTableProps(){ const dt=schema.doctype; const src=DOCTYPES[dt].sources; const tbl=Object.keys(src).find(k=>src[k].table)||"items"; const flds=((src[tbl]&&src[tbl].fields)||[]).filter(f=>f.name!=="idx").slice(0,6); const cols=flds.map((f,i)=>({field:f.name,label:f.label||lbl(f.name),w:i===0?40:12,align:f.type==="num"?"right":"left"})); cols.unshift({field:"idx",label:"#",w:7,align:"center"}); return {source:tbl,columns:cols,fontSize:8,headerBg:"#eef4f7",heightMode:"variable",rowH:6,emptyRows:"lines",showHeader:true,showBorders:true}; }
function convertToTable(band,el){ const x=el.x,y=el.y,w=el.w,h=el.h; el.type="table"; el.props=makeTableProps(); el.x=x;el.y=y;el.w=Math.max(w,60);el.h=Math.max(h,12); render(); buildInspector(); if(EMBEDDED)bridge('notify',{msg:"Converted to Items table \u2014 set columns to match your template"}); }
function buildColEditor(host,band,el){
 const p=el.props,fields=DOCTYPES[schema.doctype].sources[p.source].fields;
 host.innerHTML=p.columns.map((c,i)=>`<div class="row" style="gap:5px"><input style="flex:1.2" data-col="${i}" data-k="label" value="${esc(c.label)}"><select style="flex:1.4" data-col="${i}" data-k="field">${fields.map(f=>`<option value="${f}" ${c.field===f?'selected':''}>${lbl(f)}</option>`).join("")}</select><input style="width:38px" data-col="${i}" data-k="w" type="number" value="${c.w}" title="width %"><button data-upcol="${i}" title="move left" style="border:1px solid var(--line2);background:#fff;border-radius:6px;width:22px">\u2191</button><button data-downcol="${i}" title="move right" style="border:1px solid var(--line2);background:#fff;border-radius:6px;width:22px">\u2193</button><button data-delcol="${i}" style="border:0;background:#fdf0f0;color:#9a3434;border-radius:6px;width:24px">×</button></div>`).join("")
  +`<button class="editbind" id="addcol" style="margin-top:6px">+ Add column</button>`;
 host.querySelectorAll('[data-col]').forEach(inp=>{const ev=inp.tagName==="SELECT"?"change":"input";inp.addEventListener(ev,()=>{const c=p.columns[+inp.dataset.col];c[inp.dataset.k]=inp.dataset.k==="w"?(+inp.value||10):inp.value;render();});});
const _mv=(i,j)=>{if(j<0||j>=p.columns.length)return;const t=p.columns[i];p.columns[i]=p.columns[j];p.columns[j]=t;render();buildInspector();};
 host.querySelectorAll('[data-upcol]').forEach(b=>b.addEventListener('click',()=>_mv(+b.dataset.upcol,+b.dataset.upcol-1)));
 host.querySelectorAll('[data-downcol]').forEach(b=>b.addEventListener('click',()=>_mv(+b.dataset.downcol,+b.dataset.downcol+1)));
 host.querySelectorAll('[data-delcol]').forEach(b=>b.addEventListener('click',()=>{p.columns.splice(+b.dataset.delcol,1);render();buildInspector();}));
 host.querySelector('#addcol').addEventListener('click',()=>{p.columns.push({field:fields[1]||fields[0],label:lbl(fields[1]||fields[0]),w:14,align:"left"});render();buildInspector();});
}

/* ===== LEFT PANEL (tabs) ===== */
const leftbody=document.getElementById('leftbody');
document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click',()=>{leftTab=b.dataset.tab;document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));buildLeft();}));
function buildLeft(){
 if(leftTab==="fields")buildFieldsTab();
 else if(leftTab==="blocks")buildBlocksTab();
 else if(leftTab==="layers") buildLayersTab();
 else buildElementsTab();
}
function buildFieldsTab(){
 const dt=schema.doctype,srcs=DOCTYPES[dt].sources;
 let html=`<div class="tip">Drag any field onto the page. It shows the real value automatically — no typing needed.</div>`;
 Object.keys(srcs).forEach(sk=>{
  const s=srcs[sk];
  html+=`<div class="gh">${s.label}${s.table?' · repeats per row':''}</div>`;
  s.fields.forEach(f=>{
   html+=`<button class="fld" draggable="true" data-src="${sk}" data-field="${f}">
     <span class="ft ${ftype(f)}">${ftype(f)==='num'?'#':ftype(f)==='date'?'D':'T'}</span>
     <span class="nm">${lbl(f)}<small>${f}</small></span><span class="drag">⠿</span></button>`;
  });
 });
 leftbody.innerHTML=html;
 leftbody.querySelectorAll('.fld').forEach(b=>{
  b.addEventListener('dragstart',e=>{dragPayload={kind:"field",source:b.dataset.src,field:b.dataset.field};e.dataTransfer.effectAllowed="copy";});
  b.addEventListener('click',()=>{ // click = drop into selected band (or header)
   const band=sel?findBand(sel.bandId):schema.bands[0];
   dragPayload={kind:"field",source:b.dataset.src,field:b.dataset.field};
   const inDetail=band.type==="detail"&&band.dataSource;
   const el=mkEl("field",10,Math.max(2,band.height/2-3));el.props.source=inDetail?band.dataSource:b.dataset.src;el.props.field=b.dataset.field;
   if(ftype(b.dataset.field)===T.num){el.props.align="right";el.props.decimals="2";}
   band.elements.push(el);selectEl(band.id,el.id);dragPayload=null;
  });
 });

function buildElementsTab(){

function tidyLayout(){
 let removed=0, fixed=0;
 schema.bands.forEach(b=>{
  const seen=new Set();
  b.elements = b.elements.filter(el=>{
   if(el.type==="text"){
    const t=(el.props.text||"").trim();
    if(!t){removed++; return false;}
    const key=t+"@"+Math.round(el.x/3)+","+Math.round(el.y/3);
    if(seen.has(key)){removed++; return false;}
    seen.add(key);
    el.props.nowrap=true;
    el.h=Math.max(3,+(el.props.fontSize*0.5).toFixed(1));
    fixed++;
   }
   return true;
  });
 });
 render(); buildInspector(); if(leftTab==='layers')buildLayersTab();
 if(EMBEDDED) bridge('notify',{msg:`Tidied \u2014 ${fixed} text boxes fitted, ${removed} removed`});
}

document.getElementById('showFields').onclick=()=>{showFields=true;sd();};
function sd(){document.getElementById('showData').classList.toggle('on',!showFields);document.getElementById('showFields').classList.toggle('on',showFields);render();}
const previewBtn=document.getElementById('previewBtn');
previewBtn.onclick=()=>{preview=!preview;previewBtn.classList.toggle('on',preview);previewBtn.textContent=preview?"✎ Edit":"▷ Preview";sel=null;render();buildInspector();};

document.getElementById('exportBtn').onclick=()=>{
 if(EMBEDDED){ return openSave(); }
 modalTitle.textContent="Layout saved · config_json";
 modalBody.innerHTML=`<div class="tip" style="margin-bottom:10px">This is what gets stored on the <b>Print Studio Layout</b> doctype and rendered to PDF by Frappe.</div><textarea id="expArea" readonly style="min-height:300px">${esc(JSON.stringify(schema,null,2))}</textarea>`;
 modalFoot.innerHTML=`<button class="tbtn" id="cp">Copy</button><button class="tbtn primary" id="dl">Download .json</button>`;
 document.getElementById('cp').onclick=()=>{const a=document.getElementById('expArea');a.select();document.execCommand('copy');};
 document.getElementById('dl').onclick=()=>{const blob=new Blob([document.getElementById('expArea').value],{type:"application/json"});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=schema.doctype.replace(/\s+/g,'_')+"_layout.json";a.click();};
 showModal();
};
document.getElementById('importBtn').onclick=()=>{
 if(EMBEDDED){ return openOpen(); }
 modalTitle.textContent="Load a saved layout";
 modalBody.innerHTML=`<textarea id="impArea" placeholder="Paste a layout JSON here…" style="min-height:300px"></textarea>`;
 modalFoot.innerHTML=`<button class="tbtn primary" id="ld">Load</button>`;
 document.getElementById('ld').onclick=()=>{try{const o=JSON.parse(document.getElementById('impArea').value);uid=7000;o.bands.forEach(b=>{b.id=nid("b");b.elements.forEach(e=>e.id=nid("e"));});schema=o;sel=null;doctypeSel.value=o.doctype;modal.style.display="none";render();buildInspector();}catch(e){alert("Invalid JSON: "+e.message);}};
 showModal();
};

function esc(s){return (s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

/* ===== ERPNext save / open / server preview ===== */
function applyLoaded(o){ uid=7000; o.bands.forEach(b=>{b.id=nid("b");b.elements.forEach(e=>e.id=nid("e"));}); schema=o; sel=(o.bands[0]?{bandId:o.bands[0].id}:null); }
function openSave(){
 modalTitle.textContent="Save print format";
 const def = schema.__title || (schema.doctype+" Format");
 modalBody.innerHTML=`<div class="tip" style="margin-bottom:10px">Saving creates a print format named <b>PS · <span id="ttlEcho">${esc(def)}</span></b> on <b>${esc(schema.doctype)}</b>. It will appear in the normal print menu.</div>
  <div class="row"><label style="width:90px">Format name</label><input id="saveTitle" value="${esc(def)}"></div>`;
 modalFoot.innerHTML=`<button class="tbtn" id="saveCancel">Cancel</button><button class="tbtn primary" id="saveGo">Save</button>`;
 const ti=document.getElementById('saveTitle');
 ti.addEventListener('input',()=>{document.getElementById('ttlEcho').textContent=ti.value;});
 document.getElementById('saveCancel').onclick=()=>modal.style.display="none";
 document.getElementById('saveGo').onclick=async()=>{
   const title=ti.value.trim()||def; schema.__title=title;
   const res=await bridge('saveLayout',{title,ref_doctype:schema.doctype,config_json:JSON.stringify(schema),name:currentLayoutName});
   if(res&&res.name){ currentLayoutName=res.name; bridge('notify',{msg:"Saved · print format \u201c"+ (res.print_format||("PS \u00b7 "+title)) +"\u201d ready"}); bridge('print',{doctype:schema.doctype,title}); }
   modal.style.display="none";
 };
 showModal();
}
async function openOpen(){
 modalTitle.textContent="Open a saved layout";
 modalBody.innerHTML=`<div class="tip">Loading…</div>`; modalFoot.innerHTML=""; showModal();
 const rows=await bridge('listLayouts',{ref_doctype:schema.doctype})||[];
 if(!rows.length){ modalBody.innerHTML=`<div class="empty">No saved layouts for ${esc(schema.doctype)} yet.</div>`; return; }
 modalBody.innerHTML=`<div class="picklist" style="max-height:50vh">`+rows.map(r=>`<button class="pk" data-name="${esc(r.name)}"><b>${esc(r.title)}</b> <small>${esc(r.ref_doctype)} · ${esc((r.modified||'').slice(0,10))}</small></button>`).join("")+`</div>`;
 modalBody.querySelectorAll('.pk').forEach(b=>b.addEventListener('click',async()=>{
   const d=await bridge('loadLayout',{name:b.dataset.name});
   if(d&&d.config_json){ const o=JSON.parse(d.config_json); await ensureDoctype(o.doctype); applyLoaded(o); currentLayoutName=d.name; schema.__title=d.title; doctypeSel.value=o.doctype; modal.style.display="none"; render(); buildInspector(); buildLeft(); }
 }));
}
const _imp=document.getElementById('importFileBtn'), _pf=document.getElementById('psFile');
if(_imp&&_pf){ _imp.onclick=()=>{ if(!EMBEDDED){ alert("Import runs inside ERPNext (it reads the file on the server)."); return; } _pf.click(); };
 _pf.onchange=async()=>{ const file=_pf.files[0]; if(!file) return; _pf.value="";
  const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(file);});
  let mode="text";
  if(/\.pdf$/i.test(file.name)){ mode=await chooseImportMode(); if(mode===null) return; }
  modalTitle.textContent="Importing \u201c"+file.name+"\u201d"; modalBody.innerHTML='<div class="tip">Reading on the server\u2026</div>'; modalFoot.innerHTML=""; showModal();
  const res=await bridge('importFile',{filename:file.name,content_b64:b64,doctype:schema.doctype,mode:mode});
  if(res&&res.bands){ applyLoaded(res); currentLayoutName=null; render(); buildInspector(); buildLeft(); modal.style.display="none"; bridge('notify',{msg:"Imported \u2014 now convert headings to variables where needed, then Save"}); }
  else { modalBody.innerHTML='<div class="empty">Could not read that file. Check that the matching library is installed on the bench (see README).</div>'; modalFoot.innerHTML='<button class="tbtn" id="impClose">Close</button>'; document.getElementById('impClose').onclick=()=>modal.style.display="none"; }
 };
}
function chooseImportMode(){ return new Promise(res=>{
  modalTitle.textContent="How should I import this PDF?";
  modalBody.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <button class="block" id="imExact" style="text-align:left"><div class="bt"><span class="d"></span>Exact copy (image)</div><small>Pixel-perfect like the original. Best for fixed pre-printed templates \u2014 you just drop the value fields on top. Cannot edit the original text.</small></button>
    <button class="block" id="imText" style="text-align:left"><div class="bt"><span class="d"></span>Editable text</div><small>Pulls out the text, headings &amp; lines so you can move/edit them. Dense layouts may overlap and need cleanup.</small></button>
  </div>`;
  modalFoot.innerHTML=`<button class="tbtn" id="imCancel">Cancel</button>`;
  document.getElementById('imExact').onclick=()=>{modal.style.display="none";res("image");};
  document.getElementById('imText').onclick=()=>{modal.style.display="none";res("text");};
  document.getElementById('imCancel').onclick=()=>{modal.style.display="none";res(null);};
  showModal();
});}
let _pvScale=0.7;
const _sp=document.getElementById('serverPrevBtn'); if(_sp) _sp.onclick=async()=>{
 if(!EMBEDDED){ alert("Server preview is available inside ERPNext."); return; }
 modalTitle.textContent="PDF preview (real data, server-rendered)";
 modalBody.innerHTML=`<div class="tip">Rendering on the server…</div>`; modalFoot.innerHTML=""; showModal();
 const html=await bridge('serverPreview',{doctype:schema.doctype,layout_json:JSON.stringify(schema)});
 _pvScale=0.7;
 modalBody.innerHTML=`<div id="pvScroll" style="overflow:auto;max-height:62vh;background:#e9ecef;border-radius:8px;padding:14px">
   <div id="pvInner" style="background:#fff;border:1px solid var(--line2);box-shadow:0 4px 16px rgba(0,0,0,.12);padding:6mm;width:210mm;transform-origin:top left">${html||'<i>No preview.</i>'}</div></div>`;
 modalFoot.innerHTML=`<div class="zoom" style="margin-right:auto"><button id="pvOut">\u2212</button><span id="pvLbl"></span><button id="pvIn">+</button></div>
   <button class="tbtn" id="pvFit">Fit width</button><button class="tbtn" id="pvClose">Close</button>`;
 const apply=()=>{ const inner=document.getElementById('pvInner'); if(inner){inner.style.transform="scale("+_pvScale+")";} const lb=document.getElementById('pvLbl'); if(lb)lb.textContent=Math.round(_pvScale*100)+"%"; };
 document.getElementById('pvIn').onclick=()=>{_pvScale=Math.min(2,_pvScale+0.1);apply();};
 document.getElementById('pvOut').onclick=()=>{_pvScale=Math.max(0.3,_pvScale-0.1);apply();};
 document.getElementById('pvFit').onclick=()=>{ const sc=document.getElementById('pvScroll'); _pvScale=Math.max(0.3,Math.min(2,((sc.clientWidth-28)/ (210*3.7795)))); apply(); };
 document.getElementById('pvClose').onclick=()=>modal.style.display="none";
 apply();
};

/* boot */
(async function(){ buildLeft(); render(); buildInspector();
  if(EMBEDDED){
    const want=new URLSearchParams(location.search).get('layout');
    if(want){
      const d=await bridge('loadLayout',{name:want});
      if(d&&d.config_json){ const o=JSON.parse(d.config_json); await ensureDoctype(o.doctype); applyLoaded(o); currentLayoutName=d.name; schema.__title=d.title; }
      else { await ensureDoctype(schema.doctype); schema=genericSchema(schema.doctype); sel=null; }
    } else { await ensureDoctype(schema.doctype); schema=genericSchema(schema.doctype); sel=null; }
    await populateDoctypes(); doctypeSel.value=schema.doctype; render(); buildInspector(); buildLeft();
  }
  else { /* standalone: seeded sample data already present */ if(typeof populateDoctypes==='function'){} }
})();
</script>
